<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer Trendy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff;color:#111;}

header{
background:linear-gradient(90deg,#00c6ff,#00ff99);
padding:20px;
text-align:center;
}

header h1{font-size:26px;font-weight:700;}

.search-box{text-align:center;padding:15px;background:#f2f9ff;}
.search-box input{
width:80%;max-width:400px;padding:10px;
border:2px solid #00c6ff;border-radius:6px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;padding:30px 15px;
max-width:1100px;margin:auto;
}

.card{
background:#fff;border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;height:220px;object-fit:cover;
}

.card-content{padding:12px;}
.card-content h3{font-size:14px;min-height:38px;}
.price{font-weight:700;color:#0072ff;margin:6px 0;}

.buy-btn{
display:block;text-align:center;
padding:8px;
background:linear-gradient(90deg,#00c6ff,#00ff99);
color:#000;border-radius:6px;
cursor:pointer;font-weight:600;
}

footer{
text-align:center;padding:20px;
background:#000;color:#fff;
}

/* MODALS */
.modal,.confirm-modal{
display:none;position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;align-items:center;
}

.modal-content{
background:#fff;padding:20px;
border-radius:10px;width:90%;max-width:400px;
}

.modal-content input,.modal-content textarea{
width:100%;padding:8px;margin:6px 0;
border:1px solid #ccc;border-radius:6px;
}

.submit-btn{
background:#25D366;color:#fff;
padding:10px;border:none;width:100%;
border-radius:6px;cursor:pointer;font-weight:600;
}

.confirm-box{
background:#fff;padding:25px;
border-radius:12px;text-align:center;
max-width:320px;
}

.confirm-box h3{color:#00c853;margin-bottom:10px;}

.close-btn{
margin-top:10px;padding:6px 12px;
background:#0072ff;color:#fff;
border:none;border-radius:6px;
cursor:pointer;
}

/* LIVE ORDER POPUP */
.live-order-popup{
position:fixed;
bottom:20px;
left:20px;
background:#fff;
padding:12px 15px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
font-size:13px;
z-index:9999;
display:none;
max-width:250px;
animation:slideUp 0.5s ease;
}

.live-order-popup strong{color:#0072ff;}

@keyframes slideUp{
from{transform:translateY(20px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

@media(max-width:600px){
.products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<h1>Sudheer Trendy Store</h1>
</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<section class="products" id="productList"></section>

<!-- ORDER FORM -->
<div class="modal" id="orderModal">
<div class="modal-content">
<h3>Enter Delivery Details</h3>
<input type="text" id="custName" placeholder="Full Name" required>
<input type="text" id="custMobile" placeholder="Mobile Number" required>
<textarea id="custAddress" placeholder="Full Address" required></textarea>
<input type="text" id="custPin" placeholder="Pincode" required>
<button class="submit-btn" onclick="sendOrder()">Submit Order</button>
</div>
</div>

<!-- CONFIRMATION -->
<div class="confirm-modal" id="confirmModal">
<div class="confirm-box">
<h3>✅ Order Submitted!</h3>
<p id="orderIdText"></p>
<button class="close-btn" onclick="closeConfirm()">OK</button>
</div>
</div>

<!-- LIVE POPUP -->
<div class="live-order-popup" id="liveOrder"></div>

<footer>
More exciting products coming soon... Stay tuned 🚀
</footer>

<script>
const products=[
{name:"Airp1ods TWS Wireless Earbuds",price:"₹452",img:"airp1ods-tws.jpg"},
{name:"Wappler BT 235V3 Neckband",price:"₹423",img:"wappler-neckband.jpg"},
{name:"ANC Deep Bass Earbuds",price:"₹595",img:"anc-earbuds.jpg"},
{name:"Bullet Magnetic Neckband (Red)",price:"₹575",img:"bullet-neckband.jpg"},
{name:"Women Rectangular Sunglasses",price:"₹325",img:"rectangular-sunglasses.jpg"},
{name:"AALAE Stylish Sunglasses",price:"₹304",img:"aalae-sunglasses.jpg"},
{name:"Portable Double Spray Mini AC",price:"₹1354",img:"double-spray-ac.jpg"},
{name:"Portable Mini AC Air Cooler",price:"₹756",img:"mini-ac-cooler.jpg"},
{name:"Mini Table Fan 5 Inch",price:"₹575",img:"mini-table-fan.jpg"},
{name:"USB Mini Night Light (Pack of 4)",price:"₹296",img:"usb-night-light.jpg"},
{name:"Noise Quad Call Elite",price:"₹1899",img:"quad-call-elite.jpg"},
{name:"Noise ColorFit Icon 2 Elite",price:"₹1699",img:"colorfit-icon2.jpg"},
{name:"Top Quality Digital Smartwatch",price:"₹711",img:"digital-smartwatch.jpg"},
{name:"Smartwatch Black Edition",price:"₹1182",img:"smartwatch-black.jpg"}
];

let selectedProduct="",selectedPrice="";

function renderProducts(){
const list=document.getElementById("productList");
list.innerHTML="";
products.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">${p.price}</div>
<div class="buy-btn" onclick="openForm('${p.name}','${p.price}')">Buy Now</div>
</div></div>`;
});
}
renderProducts();

function searchProducts(){
let input=document.getElementById("searchInput").value.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
let title=card.querySelector("h3").innerText.toLowerCase();
card.style.display=title.includes(input)?"block":"none";
});
}

function openForm(name,price){
selectedProduct=name;
selectedPrice=price;
document.getElementById("orderModal").style.display="flex";
}

function generateOrderId(){
let random=Math.floor(Math.random()*100000);
return "SUD"+new Date().getFullYear()+random;
}

function sendOrder(){
let name=document.getElementById("custName").value;
let mobile=document.getElementById("custMobile").value;
let address=document.getElementById("custAddress").value;
let pin=document.getElementById("custPin").value;

if(!name||!mobile||!address||!pin){
alert("Please fill all details");
return;
}

let orderId=generateOrderId();

let message=`New Order Received%0AOrder ID: ${orderId}%0AProduct: ${selectedProduct}%0APrice: ${selectedPrice}%0AName: ${name}%0AMobile: ${mobile}%0AAddress: ${address}%0APincode: ${pin}%0APayment: COD`;

document.getElementById("orderModal").style.display="none";
document.getElementById("orderIdText").innerText="Your Order ID: "+orderId;
document.getElementById("confirmModal").style.display="flex";

setTimeout(()=>{
window.open(`https://wa.me/919235184684?text=${message}`,'_blank');
},1500);
}

function closeConfirm(){
document.getElementById("confirmModal").style.display="none";
}

/* LIVE FAKE ORDERS */
const fakeNames=["Rohit","Aman","Priya","Neha","Vikash","Pooja","Ankit","Rahul","Simran","Arjun"];
const fakeCities=["Delhi","Mumbai","Lucknow","Kolkata","Bhopal","Jaipur","Patna","Kanpur","Chennai","Indore"];

function showFakeOrder(){
let name=fakeNames[Math.floor(Math.random()*fakeNames.length)];
let city=fakeCities[Math.floor(Math.random()*fakeCities.length)];
let product=products[Math.floor(Math.random()*products.length)].name;

let popup=document.getElementById("liveOrder");
popup.innerHTML=`<strong>${name}</strong> from ${city}<br>just ordered <strong>${product}</strong>`;
popup.style.display="block";

setTimeout(()=>{ popup.style.display="none"; },4000);
}

setInterval(showFakeOrder,20000);
</script>

</body>
</html>
