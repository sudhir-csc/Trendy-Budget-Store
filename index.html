<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer Trendy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f7ff;color:#111;transition:0.3s;}
body.dark{background:#111;color:#fff;}

header{
background:#0a58ff;color:#fff;padding:15px;
display:flex;justify-content:space-between;align-items:center;
position:fixed;top:0;width:100%;z-index:1000;
}

.logo{font-weight:600;font-size:18px;}
.search-box{margin-left:10px;}
.search-box input{
padding:6px;border-radius:8px;border:none;
}

.toggle-dark{cursor:pointer;margin-left:10px;}

.top-banner{margin-top:70px;}
.top-banner img{width:100%;}

.categories{
display:flex;overflow:auto;padding:10px;
gap:10px;background:#fff;
position:sticky;top:60px;z-index:900;
}
.categories button{
padding:6px 12px;border:none;
border-radius:20px;background:#eee;
cursor:pointer;font-size:12px;
}
.categories button.active{background:#0a58ff;color:#fff;}

.products{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#fff;border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
overflow:hidden;transition:0.3s;
}
body.dark .card{background:#1e1e1e;}

.card img{width:100%;height:160px;object-fit:cover;}

.card-content{padding:10px;}
.price{color:#0a58ff;font-weight:700;}
.badge{
background:red;color:#fff;
font-size:10px;padding:3px 6px;
border-radius:6px;display:inline-block;
margin-bottom:4px;
}

.qty{
display:flex;gap:5px;margin-top:5px;
}
.qty button{
padding:3px 8px;border:none;
background:#ddd;border-radius:5px;
cursor:pointer;
}

.buy-btn{
background:#00c853;color:#fff;
padding:6px;text-align:center;
border-radius:8px;margin-top:6px;
cursor:pointer;font-size:13px;
}

footer{
background:#111;color:#fff;
padding:30px 15px;text-align:center;
margin-top:30px;font-size:13px;
}
footer a{color:#0a58ff;display:block;margin:4px 0;text-decoration:none;}
</style>
</head>

<body>

<header>
<div>
<span class="logo">Sudheer Trendy Store</span>
</div>
<div style="display:flex;align-items:center;">
<div class="search-box">
<input type="text" id="search" placeholder="Search product...">
</div>
<div class="toggle-dark" onclick="toggleDark()">🌙</div>
</div>
</header>

<div class="top-banner">
<img src="sudheer.jpg">
</div>

<div class="categories">
<button onclick="filterCategory('All')" class="active">All</button>
<button onclick="filterCategory('Shoes')">Shoes</button>
<button onclick="filterCategory('Clothes')">Clothes</button>
<button onclick="filterCategory('Mobile')">Mobile Accessories</button>
<button onclick="filterCategory('Suit')">Suit</button>
</div>

<section class="products" id="productList"></section>

<footer>
<h3>Sudheer Trendy Store</h3>
<p>Trusted Gadgets & Trending Products</p>
<a href="#">Privacy Policy</a>
<a href="#">Refund Policy</a>
<a href="#">Terms & Conditions</a>
<a href="#">Contact: sudhirbasti4@gmail.com</a>
<p>Instagram: @sudheersharma.official</p>
<p>Powered by Sudheer Tech | Growth & Digital Branding</p>
</footer>

<script>
const products=[
{name:"Airp1ods TWS Wireless Earbuds",price:452,img:"airp1ods-tws.jpg",cat:"Mobile"},
{name:"Wappler BT 235V3 Neckband",price:423,img:"wappler-neckband.jpg",cat:"Mobile"},
{name:"ANC Deep Bass Earbuds",price:595,img:"anc-earbuds.jpg",cat:"Mobile"},
{name:"Bullet Magnetic Neckband (Red)",price:575,img:"bullet-neckband.jpg",cat:"Mobile"},
{name:"Women Rectangular Sunglasses",price:325,img:"rectangular-sunglasses.jpg",cat:"Clothes"},
{name:"AALAE Stylish Sunglasses",price:304,img:"aalae-sunglasses.jpg",cat:"Clothes"},
{name:"Portable Double Spray Mini AC",price:1354,img:"double-spray-ac.jpg",cat:"Mobile"},
{name:"Portable Mini AC Air Cooler",price:756,img:"mini-ac-cooler.jpg",cat:"Mobile"},
{name:"Mini Table Fan 5 Inch",price:575,img:"mini-table-fan.jpg",cat:"Mobile"},
{name:"USB Mini Night Light (Pack of 4)",price:296,img:"usb-night-light.jpg",cat:"Mobile"},
{name:"Noise Quad Call Elite",price:1899,img:"quad-call-elite.jpg",cat:"Mobile"},
{name:"Noise ColorFit Icon 2 Elite",price:1699,img:"colorfit-icon2.jpg",cat:"Mobile"},
{name:"Top Quality Digital Smartwatch",price:711,img:"digital-smartwatch.jpg",cat:"Mobile"},
{name:"Smartwatch Black Edition",price:1182,img:"smartwatch-black.jpg",cat:"Mobile"}
];

let currentCategory="All";

function renderProducts(){
let list=document.getElementById("productList");
let search=document.getElementById("search").value.toLowerCase();
list.innerHTML="";
products.filter(p=>{
return (currentCategory==="All"||p.cat===currentCategory)
&& p.name.toLowerCase().includes(search);
})
.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<span class="badge">Trending</span>
<h4>${p.name}</h4>
<div class="price">₹${p.price}</div>
<div class="qty">
<button>-</button>
<span>1</span>
<button>+</button>
</div>
<div class="buy-btn">Buy Now</div>
</div>
</div>`;
});
}

function filterCategory(cat){
currentCategory=cat;
document.querySelectorAll(".categories button").forEach(btn=>{
btn.classList.remove("active");
if(btn.innerText.includes(cat)) btn.classList.add("active");
});
renderProducts();
}

document.getElementById("search").addEventListener("input",renderProducts);

function toggleDark(){
document.body.classList.toggle("dark");
}

renderProducts();
</script>

</body>
</html>
