header{

    color:#00ffcc;

button{

    border:none;
    padding:10px 20px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.8;
}

.feedback{
    text-align:center;
    margin:40px;
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
}

a{
    color:#00ffcc;
    text-decoration:none;
}
