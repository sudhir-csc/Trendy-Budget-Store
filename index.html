<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer Trendy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#ffffff;color:#111;}

/* HEADER */
header{
background:#0a58ff;
color:#fff;
padding:18px 15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{font-size:20px;}

.menu-btn{font-size:24px;cursor:pointer;}

.side-menu{
position:fixed;
top:0;
right:-260px;
width:250px;
height:100%;
background:#fff;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
transition:0.3s;
padding-top:60px;
z-index:9999;
}

.side-menu a{
display:block;
padding:15px 20px;
text-decoration:none;
color:#111;
border-bottom:1px solid #eee;
}

.side-menu a:hover{background:#f2f9ff;}

/* SEARCH */
.search-box{
padding:15px;
text-align:center;
}

.search-box input{
width:90%;
max-width:400px;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:#fff;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{padding:12px;}

.card-content h3{
font-size:14px;
min-height:40px;
}

.price{
color:#0a58ff;
font-weight:700;
margin:6px 0;
}

.buy-btn{
background:#00c853;
color:#fff;
text-align:center;
padding:8px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

/* MODALS */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

.modal-content input,
.modal-content textarea{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px;
}

.submit-btn{
background:#00c853;
color:#fff;
padding:10px;
border:none;
width:100%;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.confirm-box{
background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
max-width:320px;
}

.confirm-box h3{
color:#00c853;
margin-bottom:10px;
}

.close-btn{
margin-top:10px;
padding:6px 12px;
background:#0a58ff;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#f8f8f8;
margin-top:20px;
}

@media(max-width:600px){
.products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<h1>Sudheer Trendy Store</h1>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="side-menu" id="sideMenu">
<a href="#" onclick="openLogin()">🔐 Sign In</a>
<a href="#" onclick="logout()">🚪 Logout</a>
<a href="#">⭐ Feedback</a>
<a href="#">❓ Help & Support</a>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
<p id="welcomeUser" style="margin-top:10px;color:#0a58ff;font-weight:600;"></p>
</div>

<section class="products" id="productList"></section>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Sign In</h3>
<input type="text" id="loginName" placeholder="Enter Your Name">
<button class="submit-btn" onclick="saveLogin()">Login</button>
</div>
</div>

<!-- ORDER MODAL -->
<div class="modal" id="orderModal">
<div class="modal-content">
<h3>Delivery Details</h3>
<input type="text" id="custName" placeholder="Full Name">
<input type="text" id="custMobile" placeholder="Mobile Number">
<textarea id="custAddress" placeholder="Full Address"></textarea>
<input type="text" id="custPin" placeholder="Pincode">
<button class="submit-btn" onclick="sendOrder()">Submit Order</button>
</div>
</div>

<!-- CONFIRM -->
<div class="modal" id="confirmModal">
<div class="confirm-box">
<h3>✅ Order Confirmed</h3>
<p id="orderIdText"></p>
<button class="close-btn" onclick="closeConfirm()">OK</button>
</div>
</div>

<footer>
More exciting products coming soon 🚀
</footer>

<script>
const products=[
{name:"Airp1ods TWS Wireless Earbuds",price:"₹452",img:"airp1ods-tws.jpg"},
{name:"Wappler BT 235V3 Neckband",price:"₹423",img:"wappler-neckband.jpg"},
{name:"ANC Deep Bass Earbuds",price:"₹595",img:"anc-earbuds.jpg"},
{name:"Bullet Magnetic Neckband (Red)",price:"₹575",img:"bullet-neckband.jpg"},
{name:"Women Rectangular Sunglasses",price:"₹325",img:"rectangular-sunglasses.jpg"},
{name:"AALAE Stylish Sunglasses",price:"₹304",img:"aalae-sunglasses.jpg"},
{name:"Portable Double Spray Mini AC",price:"₹1354",img:"double-spray-ac.jpg"},
{name:"Portable Mini AC Air Cooler",price:"₹756",img:"mini-ac-cooler.jpg"},
{name:"Mini Table Fan 5 Inch",price:"₹575",img:"mini-table-fan.jpg"},
{name:"USB Mini Night Light (Pack of 4)",price:"₹296",img:"usb-night-light.jpg"},
{name:"Noise Quad Call Elite",price:"₹1899",img:"quad-call-elite.jpg"},
{name:"Noise ColorFit Icon 2 Elite",price:"₹1699",img:"colorfit-icon2.jpg"},
{name:"Top Quality Digital Smartwatch",price:"₹711",img:"digital-smartwatch.jpg"},
{name:"Smartwatch Black Edition",price:"₹1182",img:"smartwatch-black.jpg"}
];

let selectedProduct="",selectedPrice="";

function renderProducts(){
const list=document.getElementById("productList");
list.innerHTML="";
products.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">${p.price}</div>
<div class="buy-btn" onclick="openForm('${p.name}','${p.price}')">Buy Now</div>
</div></div>`;
});
}
renderProducts();

function searchProducts(){
let input=document.getElementById("searchInput").value.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
let title=card.querySelector("h3").innerText.toLowerCase();
card.style.display=title.includes(input)?"block":"none";
});
}

function toggleMenu(){
let menu=document.getElementById("sideMenu");
menu.style.right=menu.style.right==="0px"?"-260px":"0px";
}

function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function saveLogin(){
let name=document.getElementById("loginName").value;
if(name){
localStorage.setItem("username",name);
document.getElementById("welcomeUser").innerText="Welcome, "+name;
document.getElementById("loginModal").style.display="none";
}
}

function logout(){
localStorage.removeItem("username");
document.getElementById("welcomeUser").innerText="";
}

window.onload=function(){
let user=localStorage.getItem("username");
if(user){
document.getElementById("welcomeUser").innerText="Welcome, "+user;
}
}

function openForm(name,price){
selectedProduct=name;
selectedPrice=price;
document.getElementById("orderModal").style.display="flex";
}

function generateOrderId(){
return "SUD"+Date.now();
}

function sendOrder(){
let name=document.getElementById("custName").value;
let mobile=document.getElementById("custMobile").value;
let address=document.getElementById("custAddress").value;
let pin=document.getElementById("custPin").value;

if(!name||!mobile||!address||!pin){
alert("Fill all details");
return;
}

let orderId=generateOrderId();

let message=`New Order%0AOrder ID: ${orderId}%0AProduct: ${selectedProduct}%0APrice: ${selectedPrice}%0AName: ${name}%0AMobile: ${mobile}%0AAddress: ${address}%0APincode: ${pin}%0APayment: COD`;

document.getElementById("orderModal").style.display="none";
document.getElementById("orderIdText").innerText="Order ID: "+orderId;
document.getElementById("confirmModal").style.display="flex";

setTimeout(()=>{
window.open(`https://wa.me/919235184684?text=${message}`,'_blank');
},1500);
}

function closeConfirm(){
document.getElementById("confirmModal").style.display="none";
}
</script>

</body>
</html>
