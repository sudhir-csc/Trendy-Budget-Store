<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer Trendy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff;color:#111;}

/* HEADER */
header{
background:#0a58ff;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
width:100%;
z-index:1000;
}

header h1{font-size:18px;}

.menu-btn{
font-size:24px;
cursor:pointer;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:900;
}

/* SIDEBAR */
.side-menu{
position:fixed;
top:0;
right:-260px;
width:250px;
height:100%;
background:#fff;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
transition:0.3s;
padding-top:70px;
z-index:1001;
}

.side-menu.open{
right:0;
}

.side-menu a{
display:block;
padding:15px 20px;
text-decoration:none;
color:#111;
border-bottom:1px solid #eee;
}

.side-menu a:hover{
background:#f2f5ff;
}

/* TOP IMAGE */
.top-banner{
margin-top:60px;
text-align:center;
}

.top-banner img{
width:100%;
max-height:300px;
object-fit:cover;
}

/* SEARCH */
.search-box{
padding:15px;
text-align:center;
}

.search-box input{
width:90%;
max-width:400px;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:#fff;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{padding:12px;}

.price{
color:#0a58ff;
font-weight:700;
margin:6px 0;
}

.buy-btn{
background:#00c853;
color:#fff;
text-align:center;
padding:8px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

/* FEEDBACK */
.feedback-section{
max-width:600px;
margin:30px auto;
padding:20px;
display:none;
}

.stars span{
font-size:25px;
cursor:pointer;
color:#ccc;
}

.stars span.active{
color:#ffc107;
}

.review{
background:#f5f5f5;
padding:10px;
margin-top:10px;
border-radius:6px;
}

/* LOGIN MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

.modal-content input{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px;
}

.submit-btn{
background:#00c853;
color:#fff;
padding:10px;
border:none;
width:100%;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

@media(max-width:600px){
.products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<h1>Sudheer Trendy Store</h1>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="sideMenu">
<a href="#" onclick="openLogin();toggleMenu()">🔐 Sign In</a>
<a href="#" onclick="openFeedback();toggleMenu()">⭐ Feedback</a>
<a href="#" onclick="openHelp();toggleMenu()">❓ Help & Support</a>
</div>

<div class="top-banner">
<img src="sudheer.jpg">
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
<p id="welcomeUser" style="margin-top:10px;color:#0a58ff;font-weight:600;"></p>
</div>

<section class="products" id="productList"></section>

<div class="feedback-section" id="feedbackSection">
<h3>Rate Our Store</h3>
<div class="stars">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>
<textarea id="reviewText" placeholder="Write feedback..." style="width:100%;padding:8px;margin-top:10px;"></textarea>
<button class="submit-btn" onclick="submitReview()">Submit</button>
<div id="reviews"></div>
</div>

<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Sign In</h3>
<input type="text" id="loginName" placeholder="Enter Name">
<button class="submit-btn" onclick="saveLogin()">Login</button>
</div>
</div>

<script>
const products=[
{name:"Airp1ods TWS Wireless Earbuds",price:"₹452",img:"airp1ods-tws.jpg"},
{name:"Wappler BT 235V3 Neckband",price:"₹423",img:"wappler-neckband.jpg"},
{name:"ANC Deep Bass Earbuds",price:"₹595",img:"anc-earbuds.jpg"},
{name:"Bullet Magnetic Neckband (Red)",price:"₹575",img:"bullet-neckband.jpg"},
{name:"Women Rectangular Sunglasses",price:"₹325",img:"rectangular-sunglasses.jpg"},
{name:"AALAE Stylish Sunglasses",price:"₹304",img:"aalae-sunglasses.jpg"},
{name:"Portable Double Spray Mini AC",price:"₹1354",img:"double-spray-ac.jpg"},
{name:"Portable Mini AC Air Cooler",price:"₹756",img:"mini-ac-cooler.jpg"},
{name:"Mini Table Fan 5 Inch",price:"₹575",img:"mini-table-fan.jpg"},
{name:"USB Mini Night Light (Pack of 4)",price:"₹296",img:"usb-night-light.jpg"},
{name:"Noise Quad Call Elite",price:"₹1899",img:"quad-call-elite.jpg"},
{name:"Noise ColorFit Icon 2 Elite",price:"₹1699",img:"colorfit-icon2.jpg"},
{name:"Top Quality Digital Smartwatch",price:"₹711",img:"digital-smartwatch.jpg"},
{name:"Smartwatch Black Edition",price:"₹1182",img:"smartwatch-black.jpg"}
];

function renderProducts(){
let list=document.getElementById("productList");
list.innerHTML="";
products.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h4>${p.name}</h4>
<div class="price">${p.price}</div>
<div class="buy-btn">Buy Now</div>
</div></div>`;
});
}
renderProducts();

function toggleMenu(){
const menu=document.getElementById("sideMenu");
const overlay=document.getElementById("overlay");
menu.classList.toggle("open");
overlay.style.display=menu.classList.contains("open")?"block":"none";
}

function searchProducts(){
let input=document.getElementById("searchInput").value.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
let title=card.querySelector("h4").innerText.toLowerCase();
card.style.display=title.includes(input)?"block":"none";
});
}

function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function saveLogin(){
let name=document.getElementById("loginName").value;
if(name){
localStorage.setItem("username",name);
document.getElementById("welcomeUser").innerText="Welcome, "+name;
document.getElementById("loginModal").style.display="none";
}
}

window.onload=function(){
let user=localStorage.getItem("username");
if(user){
document.getElementById("welcomeUser").innerText="Welcome, "+user;
}
}

function openFeedback(){
document.getElementById("feedbackSection").style.display="block";
}

let currentRating=0;
function rate(num){
currentRating=num;
let stars=document.querySelectorAll(".stars span");
stars.forEach((s,i)=>s.classList.toggle("active",i<num));
}

function submitReview(){
let text=document.getElementById("reviewText").value;
if(text){
document.getElementById("reviews").innerHTML+=
`<div class="review">⭐ ${currentRating}/5<br>${text}</div>`;
document.getElementById("reviewText").value="";
}
}

function openHelp(){
let problem=prompt("Describe your problem:");
if(problem){
window.location.href=`mailto:sudhirbasti4@gmail.com?subject=Help Request&body=${problem}`;
}
}
</script>

</body>
</html>
