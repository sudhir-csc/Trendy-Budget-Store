<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer Trendy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff;color:#111;}

/* HEADER */
header{
background:#0a58ff;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
width:100%;
z-index:1000;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

.logo{
font-size:18px;
font-weight:600;
}

.cart-icon{
position:relative;
cursor:pointer;
font-size:20px;
}

.cart-count{
position:absolute;
top:-6px;
right:-8px;
background:red;
color:#fff;
font-size:11px;
padding:3px 6px;
border-radius:50%;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:900;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-250px;
width:240px;
height:100%;
background:#fff;
box-shadow:5px 0 20px rgba(0,0,0,0.2);
transition:0.3s;
padding-top:70px;
z-index:1001;
}

.sidebar.open{
left:0;
}

.sidebar a{
display:block;
padding:15px;
text-decoration:none;
color:#111;
border-bottom:1px solid #eee;
}

/* BANNER */
.top-banner{
margin-top:70px;
}

.top-banner img{
width:100%;
max-height:300px;
object-fit:cover;
}

/* PRODUCTS */
.products{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#fff;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
overflow:hidden;
transition:0.3s;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.price{
color:#0a58ff;
font-weight:700;
margin:6px 0;
}

.rating{
font-size:12px;
color:#ff9800;
}

.buy-btn{
background:#00c853;
color:#fff;
padding:8px;
text-align:center;
border-radius:10px;
margin-top:8px;
cursor:pointer;
font-weight:600;
}

.cart-btn{
background:#111;
color:#fff;
padding:6px;
text-align:center;
border-radius:10px;
margin-top:6px;
cursor:pointer;
font-size:13px;
}

/* CART PANEL */
.cart-panel{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#fff;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:15px;
transition:0.3s;
z-index:1001;
overflow:auto;
}

.cart-panel.open{
right:0;
}

.remove-btn{
color:red;
cursor:pointer;
font-size:12px;
}

.checkout-btn{
background:#00c853;
color:#fff;
padding:8px;
border-radius:8px;
text-align:center;
margin-top:10px;
cursor:pointer;
font-weight:600;
}

/* FORM */
.form-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:2000;
}

.form-box{
background:#fff;
padding:20px;
border-radius:15px;
width:90%;
max-width:350px;
}

.form-box input, .form-box textarea{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ddd;
border-radius:8px;
}

@media(max-width:600px){
.products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<div class="left">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="logo">Sudheer Trendy Store</div>
</div>

<div class="cart-icon" onclick="toggleCart()">🛒
<span class="cart-count" id="cartCount">0</span>
</div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
<a href="#">Home</a>
<a href="#">My Orders</a>
<a href="#">Feedback</a>
<a href="#">Help & Support</a>
</div>

<div class="top-banner">
<img src="sudheer.jpg">
</div>

<section class="products" id="productList"></section>

<div class="cart-panel" id="cartPanel">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<h4 id="cartTotal"></h4>
<div class="checkout-btn" onclick="checkoutCart()">Buy All</div>
</div>

<div class="form-modal" id="orderForm">
<div class="form-box">
<h3>Delivery Details</h3>
<input type="text" id="custName" placeholder="Full Name">
<input type="text" id="custMobile" placeholder="Mobile Number">
<textarea id="custAddress" placeholder="Full Address"></textarea>
<input type="text" id="custPin" placeholder="Pincode">
<div class="buy-btn" onclick="submitOrder()">Submit Order</div>
</div>
</div>

<script>
const products=[
{name:"Airp1ods TWS Wireless Earbuds",price:452,img:"airp1ods-tws.jpg"},
{name:"Wappler BT 235V3 Neckband",price:423,img:"wappler-neckband.jpg"},
{name:"ANC Deep Bass Earbuds",price:595,img:"anc-earbuds.jpg"},
{name:"Bullet Magnetic Neckband (Red)",price:575,img:"bullet-neckband.jpg"},
{name:"Women Rectangular Sunglasses",price:325,img:"rectangular-sunglasses.jpg"},
{name:"AALAE Stylish Sunglasses",price:304,img:"aalae-sunglasses.jpg"},
{name:"Portable Double Spray Mini AC",price:1354,img:"double-spray-ac.jpg"},
{name:"Portable Mini AC Air Cooler",price:756,img:"mini-ac-cooler.jpg"},
{name:"Mini Table Fan 5 Inch",price:575,img:"mini-table-fan.jpg"},
{name:"USB Mini Night Light (Pack of 4)",price:296,img:"usb-night-light.jpg"},
{name:"Noise Quad Call Elite",price:1899,img:"quad-call-elite.jpg"},
{name:"Noise ColorFit Icon 2 Elite",price:1699,img:"colorfit-icon2.jpg"},
{name:"Top Quality Digital Smartwatch",price:711,img:"digital-smartwatch.jpg"},
{name:"Smartwatch Black Edition",price:1182,img:"smartwatch-black.jpg"}
];

let cart=[];
let selectedProduct=null;

function renderProducts(){
let list=document.getElementById("productList");
products.forEach((p,i)=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h4>${p.name}</h4>
<div class="rating">⭐⭐⭐⭐☆ (4.5)</div>
<div class="price">₹${p.price}</div>
<div class="buy-btn" onclick="openForm(${i})">Buy Now</div>
<div class="cart-btn" onclick="addToCart(${i})">Add to Cart</div>
</div>
</div>`;
});
}
renderProducts();

function openForm(index){
selectedProduct=products[index];
document.getElementById("orderForm").style.display="flex";
}

function submitOrder(){
let name=document.getElementById("custName").value;
let mobile=document.getElementById("custMobile").value;
let address=document.getElementById("custAddress").value;
let pin=document.getElementById("custPin").value;
if(!name||!mobile||!address||!pin){alert("Fill all details");return;}
let msg=`New Order:%0AProduct: ${selectedProduct.name}%0APrice: ₹${selectedProduct.price}%0AName: ${name}%0AMobile: ${mobile}%0AAddress: ${address}%0APincode: ${pin}%0APayment: COD`;
window.open(`https://wa.me/919235184684?text=${msg}`,'_blank');
document.getElementById("orderForm").style.display="none";
}

function addToCart(index){
cart.push(products[index]);
updateCart();
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function updateCart(){
let items=document.getElementById("cartItems");
let total=0;
items.innerHTML="";
cart.forEach((item,i)=>{
total+=item.price;
items.innerHTML+=`${item.name} - ₹${item.price} <span class="remove-btn" onclick="removeItem(${i})">Remove</span><br>`;
});
document.getElementById("cartCount").innerText=cart.length;
document.getElementById("cartTotal").innerText="Total: ₹"+total;
}

function checkoutCart(){
if(cart.length===0){alert("Cart is empty");return;}
let message="New Cart Order:%0A";
cart.forEach(item=>{
message+=`${item.name} - ₹${item.price}%0A`;
});
window.open(`https://wa.me/919235184684?text=${message}`,'_blank');
}

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
document.getElementById("overlay").style.display="block";
}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("open");
document.getElementById("overlay").style.display="block";
}

function closeAll(){
document.getElementById("sidebar").classList.remove("open");
document.getElementById("cartPanel").classList.remove("open");
document.getElementById("overlay").style.display="none";
}
</script>

</body>
</html>
